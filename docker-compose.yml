services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: soundpulse
      POSTGRES_USER: soundpulse
      POSTGRES_PASSWORD: soundpulse_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./api:/app/api
      - ./shared:/app/shared
      - ./scrapers:/app/scrapers
      - ./scripts:/app/scripts
      - ./config:/app/config
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./api:/app/api
      - ./shared:/app/shared
      - ./scrapers:/app/scrapers
      - ./scripts:/app/scripts
    command: celery -A scrapers.celery_app worker --loglevel=info --concurrency=2

  celery-beat:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./api:/app/api
      - ./shared:/app/shared
      - ./scrapers:/app/scrapers
      - ./scripts:/app/scripts
    command: celery -A scrapers.celery_app beat --loglevel=info

volumes:
  pgdata:
